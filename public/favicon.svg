<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#0a0a14"/>
  <!-- Ship hull -->
  <rect x="4" y="16" width="24" height="2" fill="#e8dcc8"/>
  <rect x="6" y="18" width="20" height="4" fill="#6b3e1c"/>
  <rect x="8" y="22" width="16" height="2" fill="#c8b898"/>
  <!-- Mast -->
  <rect x="15" y="6" width="2" height="10" fill="#6b3e1c"/>
  <!-- Sail -->
  <polygon points="14,8 14,14 10,14" fill="#40c0f0"/>
  <polygon points="17,8 17,14 22,14" fill="#40c0f0"/>
  <!-- Skull -->
  <rect x="14" y="10" width="4" height="3" fill="#f0c040" rx="1"/>
  <!-- Water -->
  <rect x="0" y="24" width="32" height="8" fill="#1a2a4e" opacity="0.6"/>
</svg>
